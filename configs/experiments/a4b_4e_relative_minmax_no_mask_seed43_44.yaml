base: alpha_tot_a2_best_base.yaml

experiment_name: a4b_4e_relative_minmax_no_mask
experiment_group: a4b_4e_relative_minmax_no_mask_seed43_44

dataset:
  modalities: [ToT, ToA]

normalization:
  ToT:
    enabled: true
    log1p: false
    ignore_zero: true
  ToA:
    enabled: true
    log1p: false
    ignore_zero: true

data:
  toa_transform: relative_minmax
  add_hit_mask: false

split:
  seed: 42
  reuse_split: true
  path: outputs/splits/Alpha_100_ToT-ToA_seed42_0.8_0.1_0.1.json

grid:
  training.seed:
    - 43
    - 44
