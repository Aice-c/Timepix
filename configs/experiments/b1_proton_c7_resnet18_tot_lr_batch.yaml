base: proton_resnet18_tot.yaml

experiment_name: b1_proton_c7_resnet18_tot_lr_batch_ep25
experiment_group: b1_proton_c7_resnet18_tot_lr_batch_ep25

dataset:
  config: ../datasets/proton_c_7.yaml
  modalities: [ToT]

task:
  type: classification
  primary_metric: val_accuracy

model:
  name: resnet18_no_maxpool
  pretrained: false
  conv1_kernel_size: 2
  conv1_stride: 1
  conv1_padding: 0
  feature_dim: 256
  hidden_dim: 512
  dropout: 0.1
  fusion_mode: none

loss:
  name: cross_entropy
  label_encoding: onehot

handcrafted_features:
  enabled: false
  standardize: true
  features: {}

training:
  epochs: 25
  weight_decay: 0.0001
  scheduler: cosine
  eta_min: 0.0000001
  early_stopping_patience: 5
  seed: 42
  mixed_precision: true
  mixed_precision_dtype: float16

split:
  train: 0.8
  val: 0.1
  test: 0.1
  seed: 42
  reuse_split: true
  path: outputs/splits/Proton_C_7_ToT_seed42_0.8_0.1_0.1.json

normalization:
  ToT:
    enabled: true
    log1p: false
    ignore_zero: true

grid:
  training.learning_rate:
    - 0.0001
    - 0.0003
    - 0.001
  training.batch_size:
    - 64
    - 128
    - 256
