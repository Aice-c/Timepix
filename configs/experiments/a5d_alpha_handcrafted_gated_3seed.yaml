base: alpha_tot_a2_best_base.yaml

experiment_name: a5d_alpha_handcrafted_gated_3seed
experiment_group: a5d_alpha_handcrafted_gated_3seed

dataset:
  modalities: [ToT]

split:
  seed: 42
  reuse_split: true
  path: outputs/splits/Alpha_100_ToT-ToA_seed42_0.8_0.1_0.1.json

model:
  fusion_mode: gated

handcrafted_features:
  enabled: true
  standardize: true
  source_modalities: [ToT, ToA]
  features: []

grid:
  handcrafted_features.features:
    # A5d-main: complete compact physical feature set selected from A5c.
    - [active_pixel_count, bbox_fill_ratio, ToT_density, ToA_span, ToA_major_axis_corr_abs]
    # A5d-diagnostic: validation-best ToA scalar group from A5c.
    - [ToA_span, ToA_major_axis_corr_abs]
  training.seed:
    - 42
    - 43
    - 44
