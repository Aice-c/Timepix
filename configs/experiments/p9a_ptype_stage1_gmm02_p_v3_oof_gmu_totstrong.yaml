  aux_loss:
    enabled: true
    weight_tot: 0.5
    weight_toa: 0.1

grid:
  training.seed: [42]
  split.path:
    - outputs/splits/ptype_stage1_gmm02_p_v3_oof5_seed42_fold0.json
    - outputs/splits/ptype_stage1_gmm02_p_v3_oof5_seed42_fold1.json
    - outputs/splits/ptype_stage1_gmm02_p_v3_oof5_seed42_fold2.json
    - outputs/splits/ptype_stage1_gmm02_p_v3_oof5_seed42_fold3.json
    - outputs/splits/ptype_stage1_gmm02_p_v3_oof5_seed42_fold4.json
