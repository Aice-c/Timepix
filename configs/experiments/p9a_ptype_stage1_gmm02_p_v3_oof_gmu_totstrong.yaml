base: p2c_ptype_stage1_gmm02_p_v3_gmu_base_vs_totstrong_base.yaml

experiment_name: p9a_ptype_stage1_gmm02_p_v3_oof_gmu_totstrong
experiment_group: p9a_ptype_stage1_gmm02_p_v3_oof5_seed42

dataset:
  modalities: [ToT, ToA]

data:
  toa_transform: relative_minmax

model:
