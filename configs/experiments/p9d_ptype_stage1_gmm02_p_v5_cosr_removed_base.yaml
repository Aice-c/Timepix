experiment_name: p9d_ptype_stage1_gmm02_p_v5_cosr_removed_base
experiment_group: p9d_ptype_stage1_gmm02_p_v5_cosr_removed_3model_3seed

dataset:
  config: ../datasets/particle_type_stage1_full_am_co_sr_gmm_k3_label0_2_p_v5_cosr_all3_removed.yaml
  modalities: [ToT]

task:
  type: classification
  primary_metric: val_macro_f1

model:
  name: resnet18_no_maxpool
  pretrained: false
  conv1_kernel_size: 2
  conv1_stride: 1
  conv1_padding: 0
  feature_dim: 256
  hidden_dim: 512
  dropout: 0.1
  fusion_mode: none
  aux_loss:
    enabled: true
    weight_tot: 0.3
    weight_toa: 0.1
  gate:
    init_bias_to_tot: 2.0

loss:
  name: cross_entropy
  label_encoding: onehot
  class_weight: balanced

handcrafted_features:
  enabled: false
  standardize: true
  features: {}

normalization:
  ToT:
    enabled: true
    log1p: false
    ignore_zero: true
  ToA:
    enabled: true
    log1p: false
    ignore_zero: true

data:
  crop_size: 0
  dtype: float32
  toa_transform: none
  add_hit_mask: false

augmentation:
  rotation_90: false

training:
  epochs: 50
  batch_size: 64
  learning_rate: 0.000003
  weight_decay: 0.0001
  scheduler: cosine
  eta_min: 0.0000001
  early_stopping_patience: 15
  seed: 42
  num_workers: 4
  pin_memory: true
  mixed_precision: true
  mixed_precision_dtype: float16

split:
  train: 0.8
  val: 0.1
  test: 0.1
  seed: 42
  reuse_split: true
  path: outputs/splits/ptype_stage1_gmm02_p_v5_cosr_removed_ToT-ToA_seed42_0.8_0.1_0.1.json
