experiment_name: proton_resnet18_tot
experiment_group: baseline

dataset:
  config: ../datasets/proton_c_tot.yaml
  modalities: [ToT]

task:
  type: classification
  primary_metric: val_accuracy
  max_angle: 90.0

model:
  name: resnet18
  pretrained: false
  kernel_size: 2
  feature_dim: 256
  hidden_dim: 512
  dropout: 0.1
  fusion_mode: none

loss:
  name: cross_entropy
  label_encoding: onehot

training:
  epochs: 20
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  scheduler: cosine
  early_stopping_patience: 8
  seed: 42
  num_workers: 4
  pin_memory: true

split:
  train: 0.8
  val: 0.1
  test: 0.1
  reuse_split: true

data:
  crop_size: 0
  dtype: float32

normalization:
  ToT:
    enabled: true
    log1p: false
    ignore_zero: true

augmentation:
  rotation_90: true

handcrafted_features:
  enabled: false
  standardize: true
  features: {}

output:
  root: outputs/experiments
