# TEMPLATE ONLY. Use only if B2a/B2b seed42 low-cost validation shows a useful signal.
# In the current numbering this optional 3-seed confirmation is B2c.
# Fill handcrafted_features.features with the selected ToT-only feature group.
experiment_name: b2_proton_c7_handcrafted_best_3seed
experiment_group: b2_proton_c7_handcrafted_best_3seed

dataset:
  config: ../datasets/proton_c_7.yaml
  modalities: [ToT]

task:
  type: classification
  primary_metric: val_accuracy
  max_angle: 90.0

model:
  name: resnet18_no_maxpool
  pretrained: false
  conv1_kernel_size: 2
  conv1_stride: 1
  conv1_padding: 0
  feature_dim: 256
  hidden_dim: 512
  dropout: 0.1
  # Set concat or gated according to the B2a/B2b selected setting.
  fusion_mode: concat

loss:
  name: cross_entropy
  label_encoding: onehot

training:
  epochs: 25
  batch_size: 128
  learning_rate: 0.0003
  weight_decay: 0.0001
  scheduler: cosine
  eta_min: 0.0000001
  early_stopping_patience: 8
  seed: 42
  num_workers: 4
  pin_memory: true
  progress_bar: true
  save_last_checkpoint: true
  mixed_precision: true
  mixed_precision_dtype: float16

split:
  train: 0.8
  val: 0.1
  test: 0.1
  seed: 42
  reuse_split: true
  path: outputs/splits/Proton_C_7_ToT_seed42_0.8_0.1_0.1.json

data:
  crop_size: 0
  dtype: float32

normalization:
  ToT:
    enabled: true
    log1p: false
    ignore_zero: true

augmentation:
  rotation_90: true

handcrafted_features:
  enabled: true
  standardize: true
  source_modalities: [ToT]
  # Fill only with B2a-selected ToT-only features. Do not include ToA features.
  features: []

output:
  root: outputs/experiments

grid:
  training.seed:
    - 42
    - 43
    - 44
