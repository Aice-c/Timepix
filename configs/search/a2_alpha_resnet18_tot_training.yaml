base: ../experiments/alpha_resnet18_tot.yaml

experiment_name: a2_hparam_alpha_resnet18_tot
experiment_group: a2_hparam_search_training

dataset:
  modalities: [ToT]

task:
  type: classification
  primary_metric: val_accuracy

model:
  name: resnet18_no_maxpool
  pretrained: false
  conv1_kernel_size: 2
  conv1_stride: 1
  conv1_padding: 0
  feature_dim: 256
  hidden_dim: 512
  fusion_mode: none

loss:
  name: cross_entropy
  label_encoding: onehot

handcrafted_features:
  enabled: false
  standardize: true
  features: {}

training:
  epochs: 25
  scheduler: cosine
  early_stopping_patience: 8
  seed: 42
  mixed_precision: true
  mixed_precision_dtype: float16

search:
  study_name: hparam_alpha_resnet18_tot_a2
  sampler: tpe
  seed: 42
  n_startup_trials: 6
  n_trials: 25
  direction: maximize
  objective: validation.accuracy
  storage: sqlite:///outputs/optuna/hparam_alpha_resnet18_tot_a2.db
  load_if_exists: true
  output_root: outputs/hparam_search
  parameters:
    training.learning_rate:
      type: float
      low: 0.00003
      high: 0.003
      log: true
    training.weight_decay:
      type: float
      low: 0.000001
      high: 0.001
      log: true
    training.batch_size:
      type: categorical
      choices: [32, 64, 128, 256]
    training.eta_min:
      type: float
      low: 0.0000001
      high: 0.00001
      log: true
    model.dropout:
      type: categorical
      choices: [0.0, 0.1, 0.2]
